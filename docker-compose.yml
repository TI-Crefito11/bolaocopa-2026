version: "3.9"

services:
  app:
    image: ${APP_IMAGE}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      POOL_TITLE: ${POOL_TITLE:-Bolao Rumo ao Hexa}
      ENTRY_FEE_CENTS: ${ENTRY_FEE_CENTS:-1000}
      PIX_KEY: ${PIX_KEY:-61993043994}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
    networks:
      - ${TRAEFIK_NETWORK:-traefik-public}
    deploy:
      replicas: ${APP_REPLICAS:-1}
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_NETWORK:-traefik-public}
        - traefik.http.routers.bolaocopa.rule=Host(`${DOMAIN}`)
        - traefik.http.routers.bolaocopa.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
        - traefik.http.routers.bolaocopa.tls=true
        - traefik.http.routers.bolaocopa.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}
        - traefik.http.services.bolaocopa.loadbalancer.server.port=80

networks:
  CrefitoNet:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-public}
