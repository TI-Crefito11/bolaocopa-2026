version: "3.9"

services:
  app:
    image: ${APP_IMAGE}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      POOL_TITLE: ${POOL_TITLE:-Bolao Rumo ao Hexa}
      ENTRY_FEE_CENTS: ${ENTRY_FEE_CENTS:-1000}
      PIX_KEY: ${PIX_KEY:-61993043994}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
    networks:
      - CrefitoNet
    deploy:
      replicas: ${APP_REPLICAS:-1}
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.bolaocopa.rule=Host(`bolao.crefito.gov.br`)"
        - "traefik.http.routers.bolaocopa.entrypoints=websecure"
        - "traefik.http.routers.bolaocopa.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.bolaocopa.loadbalancer.server.port=80"
        - "traefik.http.middlewares.bolaocopa-noindex.headers.customResponseHeaders.X-Robots-Tag=noindex, nofollow"
        - "traefik.http.routers.bolaocopa.middlewares=site-noindex"

networks:
  CrefitoNet:
    external: true
    name: CrefitoNet
